run:
  experiment_type: "generate"
  rng_seed: 42

mln_config:
  params_path: "./experiments/experiment_finder_method/fancy_r/bigreal/Freebase/config.yaml" # configuration parameters file
  d_max_iter: 1000 # all parameters defined explicitly will overwrite those in the params_path file
  c_max_iter: 1000
  t: 100
  eps: 0.05
  d: 2
  edges_filename: twin_edges.dat
  communities_filename: twin_communities.dat

generator:
  repetitions: 5
  out_dir: "./experiments/experiment_finder_method/fancy_r/bigreal/Freebase/twins"
